name: Bug Report
description: Report a bug in MLOOP
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: MLOOP Version
      description: What version of MLOOP are you running?
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: pi_model
    attributes:
      label: Raspberry Pi Model
      description: Which Raspberry Pi model are you using?
      placeholder: "Pi 4 Model B"
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: OS Version
      description: Output of `cat /etc/os-release`
      placeholder: "Raspberry Pi OS Lite Bookworm"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Boot with HDMI connected
        2. Wait for playback to start
        3. Unplug HDMI
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please run `scripts/collect-debug-info.sh` and paste the output.
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
